<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GitHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h2>Login</h2>
            <form action="#">
                <div class="textbox">
                    <i class="fas fa-user"></i>
                    <input type="text" placeholder="Usuário ou e-mail" name="username" required>
                </div>
                <div class="textbox">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Senha" name="password" required>
                </div>
                <div class="btn-container">
                    <button type="submit">Entrar</button>
                </div>
                <div class="footer">
                    <a href="#">Esqueceu a senha?</a>
                    <a href="#">Criar uma conta</a>
                </div>
                <div class="checkbox-container">
                    <input type="checkbox" id="showPassword"> Mostrar senha
                </div>
                <div class="checkbox-container">
                    <input type="checkbox" id="rememberMe"> Lembrar-me
                </div>
                <!-- ReCAPTCHA dentro do formulário -->
                <div class="g-recaptcha" data-sitekey="YOUR_SITE_KEY"></div>
            </form>
        </div>
    </div>

     <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <script>
        // Exibição da senha
        document.getElementById('showPassword').addEventListener('change', function() {
            const passwordInput = document.querySelector("input[name='password']");
            passwordInput.type = this.checked ? 'text' : 'password';
        });

        // Validação do formulário de login
        document.querySelector("form").addEventListener("submit", function(event) {
            let username = document.querySelector("input[name='username']").value;
            let password = document.querySelector("input[name='password']").value;

            // Adiciona ou remove a classe 'invalid' para os campos
            if (!username || !password) {
                if (!username) {
                    document.querySelector("input[name='username']").classList.add("invalid");
                }
                if (!password) {
                    document.querySelector("input[name='password']").classList.add("invalid");
                }
                alert("Por favor, preencha todos os campos.");
                event.preventDefault();
            } else {
                document.querySelector("input[name='username']").classList.remove("invalid");
                document.querySelector("input[name='password']").classList.remove("invalid");
            }
        });
    </script>
</body>
</html>
